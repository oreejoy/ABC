<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>PDF.js Viewer</title>
  <style>body{margin:0;font-family:Arial,sans-serif;}#canvas{width:100%;height:auto;display:block;}</style>
</head>
<body>
  <div>
    <button id="load">Load PDF</button>
    <input id="file" type="file" accept="application/pdf" />
  </div>
  <canvas id="canvas"></canvas>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.122/pdf.min.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    document.getElementById('load').addEventListener('click', async () => {
      const url = 'doc.pdf';
      const loadingTask = pdfjsLib.getDocument(url);
      const pdf = await loadingTask.promise;
      const page = await pdf.getPage(1);
      const viewport = page.getViewport({ scale: 1.5 });
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;
    });
  </script>
</body>
</html>
